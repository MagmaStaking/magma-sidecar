name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin to the same minor used by upstream monad-bft (rust-toolchain.toml
      # in that repo is 1.91.1). Bump together when upgrading the git rev.
      - uses: dtolnay/rust-toolchain@1.91

      # Caches ~/.cargo and ./target keyed off Cargo.lock — without this every
      # CI run cold-builds all the monad-bft deps (~10 min on a free runner).
      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-targets --locked

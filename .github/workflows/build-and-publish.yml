name: Build and Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: magmastaking/magma-sidecar
  PACKAGE_NAME: magma-sidecar

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0

      # Defense in depth: branch workflows must not publish. Secrets for APT
      # live only in the apt-publish Environment (tag refs only), but keep
      # dispatch itself on main so GHCR :dev tags are not cut from arbitrary
      # branches.
      - name: Restrict workflow_dispatch to main
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::workflow_dispatch is only allowed from main (ref=${{ github.ref }})." >&2
            exit 1
          fi

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
              echo "Tagged release: ${VERSION}"
            else
              echo "Invalid tag format: ${TAG_NAME}. Expected v<major>.<minor>.<patch>" >&2
              exit 1
            fi
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            VERSION="0~dev.${SHORT_SHA}"
            echo "Development build: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "is_tag=${{ github.ref_type == 'tag' }}" >> "$GITHUB_OUTPUT"

      # Git tags aren't tied to a branch, so a `v*` tag on any commit would
      # otherwise cut a release. Refuse to release unless the tagged commit is
      # reachable from origin/main. workflow_dispatch dev builds are unaffected.
      - name: Ensure tag is on main
        if: github.ref_type == 'tag'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Tag ${{ github.ref_name }} does not point to a commit on origin/main; refusing to release." >&2
            exit 1
          fi

  # Build each arch natively on its own runner (no QEMU emulation), push each
  # as a tag-less image by digest, then stitch them into one multi-arch tag in
  # the `merge-docker` job. Emulated arm64 builds took ~70 min; native ~10 min.
  build-docker:
    name: Build Docker image (${{ matrix.arch }})
    needs: determine-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge-docker:
    name: Merge Docker manifest
    needs: [determine-version, build-docker]
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.image-digest.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=semver,pattern={{major}},enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=raw,value=latest,enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=raw,value=dev,enable=${{ needs.determine-version.outputs.is_tag == 'false' }}
            type=raw,value=sha-${{ needs.determine-version.outputs.short_sha }},enable=${{ needs.determine-version.outputs.is_tag == 'false' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Record multi-arch image digest
        id: image-digest
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          DIGEST="sha256:$(docker buildx imagetools inspect --raw "${IMAGE_REF}" | sha256sum | cut -d' ' -f1)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  build-deb:
    name: Build .deb (${{ matrix.arch }})
    needs: determine-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            # GitHub-hosted native ARM runner (public repos / billed minutes).
            # Native build avoids QEMU-in-cargo slowness and `cross` dependency.
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0

      # Pin matches Cargo.toml's monad-bft rev. Bump together when upgrading.
      # dtolnay/rust-toolchain bakes the toolchain into each branch tip; pin that tip.
      - uses: dtolnay/rust-toolchain@ab40b01f54fe82bdf65693ea090a1e4942c136e7 # 1.91

      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: ./debian/sidecar/build-deb.sh "${{ needs.determine-version.outputs.version }}" "${{ matrix.arch }}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.arch }}-${{ needs.determine-version.outputs.version }}
          path: build/${{ env.PACKAGE_NAME }}_*_${{ matrix.arch }}.deb
          retention-days: 30

  # Production signing key + APT_REPO_TOKEN live ONLY in the apt-publish
  # Environment (not repository secrets). Configure that Environment to allow
  # only tag refs matching v*, with required reviewers. See
  # .github/workflows/README.md.
  publish-release-and-apt:
    name: Publish GitHub Release and APT repo
    needs: [determine-version, merge-docker, build-deb]
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'
    environment: apt-publish
    permissions:
      contents: write
      # Required for build provenance attestation of the published .debs.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gzip gpg

      - name: Download .deb artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Require release signing key
        env:
          APT_SIGNING_KEY_B64: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          if [[ -z "${APT_SIGNING_KEY_B64}" ]]; then
            echo "::error::APT_SIGNING_KEY is required for every published build (Environment: apt-publish)." >&2
            exit 1
          fi

      - name: Generate and sign release manifest
        env:
          APT_SIGNING_KEY_B64: ${{ secrets.APT_SIGNING_KEY }}
          VERSION: ${{ needs.determine-version.outputs.version }}
          IMAGE_DIGEST: ${{ needs.merge-docker.outputs.image_digest }}
        run: |
          printf '%s' "${APT_SIGNING_KEY_B64}" | base64 -d | gpg --import --batch --yes
          (
            cd artifacts
            {
              echo "# Magma Sidecar release manifest"
              echo "# Version: ${VERSION}"
              echo "# Source-Repository: https://github.com/${GITHUB_REPOSITORY}"
              echo "# Source-Commit: ${GITHUB_SHA}"
              echo "# Container-Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
              sha256sum ./*.deb | sed 's#  \./#  #'
            } > release-manifest.txt
            sha256sum --check release-manifest.txt
            gpg --batch --yes --armor --detach-sign \
              --output release-manifest.txt.asc release-manifest.txt
            gpg --batch --verify release-manifest.txt.asc release-manifest.txt
          )

      # Signed, non-falsifiable record that these exact .debs were built by this
      # workflow from this repo/commit. Verify on a validator with:
      #   gh attestation verify <pkg>.deb --repo MagmaStaking/magma-sidecar
      - name: Attest build provenance (.deb)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "artifacts/*.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            artifacts/*.deb
            artifacts/release-manifest.txt
            artifacts/release-manifest.txt.asc
          name: "Magma Sidecar ${{ github.ref_name }}"
          body: |
            ## Magma Sidecar ${{ github.ref_name }}

            ### Install (Debian / Ubuntu)

            ```bash
            ARCH=$(dpkg --print-architecture)   # amd64 or arm64
            wget https://github.com/MagmaStaking/magma-sidecar/releases/download/${{ github.ref_name }}/${{ env.PACKAGE_NAME }}_${{ needs.determine-version.outputs.version }}_${ARCH}.deb
            sudo dpkg -i ${{ env.PACKAGE_NAME }}_${{ needs.determine-version.outputs.version }}_${ARCH}.deb

            # Before enabling the service, follow the packaged validator guide.
            # It configures monad-bft and monad-rpc to use the ACL-protected
            # /var/run/monad-ipc/mempool.sock path.
            less /usr/share/doc/magma-sidecar/VALIDATOR_INSTALL.md
            ```

            ### What's included

            - Binary: `/usr/bin/magma-sidecar`
            - Systemd unit: `magma-sidecar.service`
            - Config: `/etc/magma-sidecar/sidecar.env` (seeded from `sidecar.env.example` on first install)
            - Validator guide: `/usr/share/doc/magma-sidecar/VALIDATOR_INSTALL.md`
            - Release verification: `/usr/share/doc/magma-sidecar/RELEASE_VERIFICATION.md`

            Docker image: `ghcr.io/magmastaking/magma-sidecar:${{ needs.determine-version.outputs.version }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Pages APT repository
        env:
          # The Pages-hosted APT repo (the pool store + served site).
          APT_REPO: ${{ vars.APT_REPO || 'MagmaStaking/magma-sidecar-apt-repo' }}
          # Fine-grained PAT with Contents:write on that repo (cross-repo push;
          # the built-in GITHUB_TOKEN can't reach another repository, and the
          # org has SSH deploy keys disabled). Stored on Environment apt-publish.
          APT_REPO_TOKEN: ${{ secrets.APT_REPO_TOKEN }}
          APT_SIGNING_KEY_B64: ${{ secrets.APT_SIGNING_KEY }}
          RELEASE_VERSION: ${{ needs.determine-version.outputs.version }}
          RELEASE_MANIFEST: artifacts/release-manifest.txt
          RELEASE_MANIFEST_SIGNATURE: artifacts/release-manifest.txt.asc
          PACKAGE: ${{ env.PACKAGE_NAME }}
        run: ./scripts/publish-apt.sh artifacts/*.deb

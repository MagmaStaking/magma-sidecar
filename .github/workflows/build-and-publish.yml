name: Build and Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: magmastaking/magma-sidecar
  PACKAGE_NAME: magma-sidecar

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            if [[ "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
              echo "Tagged release: ${VERSION}"
            else
              echo "Invalid tag format: ${TAG_NAME}. Expected v<major>.<minor>.<patch>" >&2
              exit 1
            fi
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            VERSION="0~dev.${SHORT_SHA}"
            echo "Development build: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "is_tag=${{ github.ref_type == 'tag' }}" >> "$GITHUB_OUTPUT"

  # Build each arch natively on its own runner (no QEMU emulation), push each
  # as a tag-less image by digest, then stitch them into one multi-arch tag in
  # the `merge-docker` job. Emulated arm64 builds took ~70 min; native ~10 min.
  build-docker:
    name: Build Docker image (${{ matrix.arch }})
    needs: determine-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge-docker:
    name: Merge Docker manifest
    needs: [determine-version, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=semver,pattern={{major}},enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=raw,value=latest,enable=${{ needs.determine-version.outputs.is_tag == 'true' }}
            type=raw,value=dev,enable=${{ needs.determine-version.outputs.is_tag == 'false' }}
            type=raw,value=sha-${{ needs.determine-version.outputs.short_sha }},enable=${{ needs.determine-version.outputs.is_tag == 'false' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  build-deb:
    name: Build .deb (${{ matrix.arch }})
    needs: determine-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            # GitHub-hosted native ARM runner (public repos / billed minutes).
            # Native build avoids QEMU-in-cargo slowness and `cross` dependency.
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pin matches Cargo.toml's monad-bft rev. Bump together when upgrading.
      - uses: dtolnay/rust-toolchain@1.91

      - uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.arch }}

      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: ./debian/sidecar/build-deb.sh "${{ needs.determine-version.outputs.version }}" "${{ matrix.arch }}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.arch }}-${{ needs.determine-version.outputs.version }}
          path: build/${{ env.PACKAGE_NAME }}_*_${{ matrix.arch }}.deb
          retention-days: 30

  publish-release-and-apt:
    name: Publish GitHub Release and APT repo
    needs: [determine-version, build-deb]
    runs-on: ubuntu-24.04
    # Skip for plain branch pushes — only tags and manual dispatch publish.
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gzip gpg

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.deb
          name: "Magma Sidecar ${{ github.ref_name }}"
          body: |
            ## Magma Sidecar ${{ github.ref_name }}

            ### Install (Debian / Ubuntu)

            ```bash
            ARCH=$(dpkg --print-architecture)   # amd64 or arm64
            wget https://github.com/MagmaStaking/magma-sidecar/releases/download/${{ github.ref_name }}/${{ env.PACKAGE_NAME }}_${{ needs.determine-version.outputs.version }}_${ARCH}.deb
            sudo dpkg -i ${{ env.PACKAGE_NAME }}_${{ needs.determine-version.outputs.version }}_${ARCH}.deb

            # At minimum set MAGMA_MONAD_RPC_URL, MAGMA_TXPOOL_SOCKET, and
            # MAGMA_NETWORK (mainnet | testnet | localnet). The gateway address
            # for each network is baked into the binary — no policy file to drop in.
            sudo vim /etc/magma-sidecar/sidecar.env
            sudo systemctl enable --now magma-sidecar
            sudo systemctl status magma-sidecar
            ```

            ### What's included

            - Binary: `/usr/bin/magma-sidecar`
            - Systemd unit: `magma-sidecar.service`
            - Config: `/etc/magma-sidecar/sidecar.env` (seeded from `sidecar.env.example` on first install)

            Docker image: `ghcr.io/magmastaking/magma-sidecar:${{ needs.determine-version.outputs.version }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Publish to S3 APT repository
        env:
          S3_BUCKET: ${{ vars.S3_APT_BUCKET || 'magma-apt-repo' }}
          APT_SIGNING_KEY_B64: ${{ secrets.APT_SIGNING_KEY }}
          PACKAGE: ${{ env.PACKAGE_NAME }}
        run: ./scripts/publish-apt.sh artifacts/*.deb
